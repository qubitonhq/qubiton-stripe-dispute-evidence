name: Docker Publish

# Publishes a multi-arch Docker image to GitHub Container Registry (ghcr.io).
#
# Tag scheme:
#   On push to main:
#     :latest                          (always points to head of main)
#     :main                            (same)
#     :main-<sha>                      (pinned to a specific commit)
#   On push of a v* tag (e.g. v1.2.3):
#     :1.2.3                           (full semver)
#     :1.2                             (minor)
#     :1                               (major)
#     :v1.2.3                          (full ref, with v prefix)
#
# No external secrets needed — uses the built-in GITHUB_TOKEN with packages:write.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write       # OIDC token for signing
  attestations: write   # for actions/attest-build-provenance

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch push (only main is in `on:` filter): :main
            type=ref,event=branch
            # Tag push v1.2.3 → :1.2.3, :1.2, :1, :v1.2.3 (full ref)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=tag
            # Pin-to-commit on main: :main-<short-sha>
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            # Floating :latest only on main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=qubiton-stripe-dispute-evidence
            org.opencontainers.image.description=Auto-build Stripe chargeback dispute evidence packets via webhook, enriched with the QubitOn API.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://www.qubiton.com/blog/stripe-dispute-evidence-packet
            org.opencontainers.image.licenses=MIT

      - name: Build and push (linux/amd64,linux/arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
